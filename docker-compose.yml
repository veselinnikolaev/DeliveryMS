version: '3.8'

services:
  # PHP & Web Server Service
  web:
    image: chialab/php-dev:8.2-apache
    container_name: deliveryms_web
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    depends_on:
      - db
    networks:
      - deliveryms_network

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: deliveryms_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: deliveryms
    volumes:
      - deliveryms_db_data:/var/lib/mysql
    networks:
      - deliveryms_network

networks:
  deliveryms_network:
    driver: bridge

volumes:
  deliveryms_db_data: